<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHNW - Campus Muttenz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a class="active" href="#home">Home</a></li>
                <li><a href="#news">Projects</a></li>
                <li><a href="#about">About Us</a></li>
            </ul>
            <img id="logo" src="img/pool.png" alt="">
        </nav>
    </header>
    <main>
        <div class="base-grid">
            <h1 class="fhnw">FHNW</h1>
        </div>
        <div class="overlay-grid" aria-hidden="true">
            <img class="img1" src="img/big/0275_Lichthof_Treppe_AH_gross.jpg" alt="FHNW Logo"> 
            <img class="img2" src="img/small/0275_OG12_Lounge_MN_klein.jpg" alt="FHNW Logo">
            <img class="img3" src="img/small/0275_aussen_Eingang_MvdB_klein.jpg" alt="FHNW Logo">
            <img class="img4" src="img/big/0275_aussen_Rückseite_AH_gross.jpg" alt="FHNW Logo">
            <img class="img5" src="img/big/0275_Dachterrasse_Lukas_Gruntz_gross.jpg" alt="FHNW Logo">
            <img class="img6" src="img/big/0275_Atrium_MvdB_gross.jpg" alt="FHNW Logo"> 
            <img class="img7" src="img/big/0275_Labor_HLS_AH_gross.jpg" alt="FHNW Logo">
            <img class="img8" src="img/PlaeneIcon/big/0275_Schnittperspektive_gross.jpg" alt="FHNW Logo">  
            <img class="mindmap notransform" src="img/mindmap.png" alt="FHNW Logo">
            <div class="background"></div>
            <img class="img9" src="img/PlaeneIcon/big/0275_Ansicht_gross.png" alt="FHNW Logo">
            <div class="plans-panel">
                <img id="plans-current" class="plans-current" src="img/PlaeneIcon/formatiert/0275_Schnitt01_klein.png" alt="Aktueller Plan">
                <div class="plans-thumbs">
                    <img class="plans-thumb active" src="img/PlaeneIcon/formatiert/0275_Schnitt01_klein.png" alt="Plan 1" data-src="img/PlaeneIcon/formatiert/0275_Schnitt01_klein.png">
                    <img class="plans-thumb" src="img/PlaeneIcon/formatiert/0275_Schnitt02_klein.png" alt="Plan 2" data-src="img/PlaeneIcon/formatiert/0275_Schnitt02_klein.png">
                    <img class="plans-thumb" src="img/PlaeneIcon/formatiert/0275_Schnitt03_klein.png" alt="Plan 3" data-src="img/PlaeneIcon/formatiert/0275_Schnitt03_klein.png">
                    <img class="plans-thumb" src="img/PlaeneIcon/formatiert/0275_2OG_Hoersaal_klein.png" alt="Plan 5" data-src="img/PlaeneIcon/formatiert/0275_2OG_Hoersaal_klein.png">
                    <img class="plans-thumb" src="img/PlaeneIcon/formatiert/0275_5OG_HLS_klein.png" alt="Plan 6" data-src="img/PlaeneIcon/formatiert/0275_5OG_HLS_klein.png">
                    <img class="plans-thumb" src="img/PlaeneIcon/formatiert/0275_Ansicht_klein.png" alt="Plan 7" data-src="img/PlaeneIcon/formatiert/0275_Ansicht_klein.png">
                    <img class="plans-thumb" src="img/PlaeneIcon/formatiert/0275_Schnittperspektive_klein.png" alt="Plan 8" data-src="img/PlaeneIcon/formatiert/0275_Schnittperspektive_klein.png">
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer">
            <h3 class="footer-text">Get in touch:</h3>
            <button>Kontakt</button>
            <button>Impressum</button>
            <button>Datenschutzerklärung</button>
        </div>
    </footer>
    <script>
    const overlayGrid = document.querySelector('.overlay-grid');
    const plansCurrent = document.querySelector('#plans-current');
    const plansThumbs = document.querySelectorAll('.plans-thumb');

    if (overlayGrid) {
        const autoScrollDelayMs = 900;
        const autoScrollDurationMs = 1900;
        const autoScrollViewportFactor = 0.98;

        overlayGrid.scrollLeft = 0;

        const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

        const animateScrollLeft = (element, targetLeft, durationMs) => {
            const startLeft = element.scrollLeft;
            const distance = targetLeft - startLeft;
            const startTime = performance.now();

            const step = (now) => {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / durationMs, 1);
                const easedProgress = easeOutCubic(progress);

                element.scrollLeft = startLeft + distance * easedProgress;

                if (progress < 1) {
                    requestAnimationFrame(step);
                }
            };

            requestAnimationFrame(step);
        };

        window.setTimeout(() => {
            const maxScrollLeft = overlayGrid.scrollWidth - overlayGrid.clientWidth;
            const targetScrollLeft = Math.min(maxScrollLeft, window.innerWidth * autoScrollViewportFactor);

            animateScrollLeft(overlayGrid, targetScrollLeft, autoScrollDurationMs);
        }, autoScrollDelayMs);

        window.addEventListener('wheel', (event) => {
            const isUpperHalf = event.clientY <= window.innerHeight / 2;

            if (isUpperHalf) {
                event.preventDefault();
                overlayGrid.scrollLeft += event.deltaY + event.deltaX;
            }
        }, { passive: false });
    }

    if (plansCurrent && plansThumbs.length) {
        plansThumbs.forEach((thumb) => {
            thumb.addEventListener('click', () => {
                plansCurrent.src = thumb.dataset.src || thumb.src;

                plansThumbs.forEach((item) => item.classList.remove('active'));
                thumb.classList.add('active');
            });
        });
    }
    </script>
</body>
</html>
